# sops + age configuration.
#
# Each contributor generates their own age keypair:
#   age-keygen -o ~/.config/sops/age/keys.txt
# Then asks the maintainer to add their PUBLIC key below.
#
# Encrypt the .env template:
#   sops -e .env > .env.sops
#
# Decrypt at runtime (used by .devcontainer/post-create.sh):
#   sops -d .env.sops
#
# Never commit .env. Only .env.sops and .env.example are committed.

creation_rules:
  - path_regex: \.env\.sops$
    age: age1vgjqa3e0g6jjv68ul2hj5f5r3g3nzmct6s969lzu9w7n2d0emdtq6nhxzn
    # Add additional contributor public keys as a comma-separated list above
    # (e.g. age1maintainer..., age1contributor...).
